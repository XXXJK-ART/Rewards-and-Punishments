 rp_merit.2010.t: "犒赏不均"
 rp_merit.2010.desc: "大帐之内,诸将皆受犒赏,酒肉盈案,金帛在前.唯独[rp_campaign_actor.GetTitledFirstName]立于帐外,手中无物,面沉如水.\n\n左右私语:“此人功勋不逊于帐内诸将,何以独遗之?”\n\n功簿所载:[rp_campaign_actor.MakeScope.Var('rp_merit_score').GetValue|0]."
 rp_merit.2010.a: "补赐金帛,当众抚慰"
 rp_merit.2010.b: "称主簿疏忽,事后再议"
 rp_merit.2010.c: "战时赏罚自有规矩"

 rp_merit.2011.t: "战车转向"
 rp_merit.2011.desc: "战鼓雷动,两军相接.[rp_campaign_actor.GetTitledFirstName]率部疾驰,起初人人皆呼其勇.可其旗号忽然斜刺里一转,不奔敌阵,反冲向己方侧翼.\n\n军中一片惊呼:先前犒赏之怨,竟在阵前爆发."
 rp_merit.2011.a: "传令军法官截停其部"
 rp_merit.2011.b: "亲率卫队上前弹压"
 rp_merit.2011.c: "全军收束,先稳住阵脚"

 rp_campaign_incident_grateful_opinion: "军前抚慰"
 rp_campaign_incident_rebuked_opinion: "军前受责"
 rp_campaign_incident_risk_opinion: "心有不平"
 rp_campaign_discipline_modifier: "军纪稍振"
 rp_campaign_discipline_modifier_desc: "军中赏罚虽严,号令因此更为明白."
 rp_campaign_disorder_modifier: "阵脚动摇"
 rp_campaign_disorder_modifier_desc: "军中有功者心生不满,诸部一时观望."
 rp_campaign_vanguard_modifier: "先头部队"
 rp_campaign_vanguard_modifier_desc: "此人获准率部追击,声势一时高涨."

 rp_merit.2020.t: "追与不追"
 rp_merit.2020.desc: "敌军败退,诸将皆言宜趁胜追击,毕其功于一役.唯有谨慎者提醒:穷寇勿追,恐有伏兵.\n\n[rp_campaign_actor.GetTitledFirstName]却按剑而笑:“战机稍纵即逝.君上若迟疑,臣自率本部追之!”\n\n功簿所载:[rp_campaign_actor.MakeScope.Var('rp_merit_score').GetValue|0]."
 rp_merit.2020.a: "准其追击,但不可深入"
 rp_merit.2020.b: "全军追击,不留余力"
 rp_merit.2020.c: "收兵回营,不追穷寇"

 rp_merit.2021.t: "山谷中伏"
 rp_merit.2021.desc: "追至山谷,两侧峭壁如削,前方道路忽断.箭矢如雨从天而降,滚木塞满谷口.\n\n[rp_campaign_actor.GetTitledFirstName]的旗帜已在谷中摇摇欲坠.先前的争功之言,此刻尽化为满营惊呼."
 rp_merit.2021.a: "亲率援军突入"
 rp_merit.2021.b: "坚守谷口,接应残兵"
 rp_merit.2021.c: "壮士断腕,全军撤退"

 rp_merit.2030.t: "夜入敌营"
 rp_merit.2030.desc: "深夜,巡营士卒来报:[rp_campaign_actor.GetTitledFirstName]不在帐中,佩剑与令旗皆失.\n\n三更时分,一骑自敌营方向驰归,正是此人.其低声道:“臣已与敌将夜谈,明日当有分晓.”\n\n若成,则是奇功;若败,便是通敌."
 rp_merit.2030.a: "此乃奇计,若能退敌当记首功"
 rp_merit.2030.b: "擅入敌营,拿下问罪"
 rp_merit.2030.c: "静待其变,明日再看"

 rp_merit.2040.t: "军前请缨"
 rp_merit.2040.desc: "军议之上,[rp_campaign_actor.GetTitledFirstName]挺身而出:“臣愿为先锋,取敌将首级献于帐前!”\n\n主帅以老成持重为由不许,此人面色顿变,帐中诸将也各自噤声."
 rp_merit.2040.a: "改任其为先锋"
 rp_merit.2040.b: "遣使安抚,许其后功"
 rp_merit.2040.c: "违抗军议,夺其兵权"

 rp_merit.2050.t: "免胄入阵"
 rp_merit.2050.desc: "战鼓方擂,[rp_campaign_actor.GetTitledFirstName]策马立于阵前,忽然摘下头盔掷于地上.\n\n左右皆惊:“将军,此非儿戏!”\n\n此人惨然一笑:“受君上厚恩而有失,唯以此身付沙场.”言毕便欲单骑冲阵."
 rp_merit.2050.a: "急令鸣金,召回此将"
 rp_merit.2050.b: "遣精锐随其冲阵"
 rp_merit.2050.c: "求仁得仁,由他去吧"

 rp_merit.2060.t: "易衣代君"
 rp_merit.2060.desc: "乱军之中,敌军直扑君上旗号.[rp_campaign_actor.GetTitledFirstName]大喝:“君上速退!”\n\n其扯下你的披风披于自身,策马向反方向驰去.敌军见旗色转移,尽数追之."
 rp_merit.2060.a: "趁此机会,全军突围"
 rp_merit.2060.b: "命全军回援,救出此将"
 rp_merit.2060.c: "此乃诈敌之计,速撤"

 rp_merit.2070.t: "饥军鼓噪"
 rp_merit.2070.desc: "军中粮饷渐窘,士卒以薄粥充饥.夜半,辎重营火光忽起,有人呼曰:“与其饿死,不如饱食而死!”\n\n喧哗声沿营垒传开,[rp_campaign_actor.GetTitledFirstName]入帐请命,只等你一句裁断."
 rp_merit.2070.a: "杀一儆百,先正军纪"
 rp_merit.2070.b: "开仓放粮,与士卒同甘"
 rp_merit.2070.c: "许以战后重赏,暂缓危局"

 rp_merit.2090.t: "夜缒出城"
 rp_merit.2090.desc: "城中被围日久,[rp_campaign_actor.GetTitledFirstName]请命夜缒而出,入敌营说其退兵.\n\n次日晨,敌营射来一箭,箭上绑书:“[rp_campaign_actor.GetTitledFirstName]已降,速开城门,免遭屠戮.”\n\n真伪未明,军心已动."
 rp_merit.2090.a: "此乃敌计,传令勿信"
 rp_merit.2090.b: "派人出城,打探虚实"
 rp_merit.2090.c: "既有降书,其家属皆治罪"

 rp_merit.2080.t: "军法如山"
 rp_merit.2080.desc: "操演之时,君上亲近之人嬉笑阵中,鼓声三通而阵型未成.[rp_campaign_actor.GetTitledFirstName]按剑上前,厉声道:\n\n“军法不立,何以临敌?今日若纵一人,明日便乱一军.”"
 rp_merit.2080.a: "准其执法"
 rp_merit.2080.b: "念其初犯,杖责免死"
 rp_merit.2080.c: "临阵换将,夺其兵权"

 rp_merit.2095.t: "三鼓之后"
 rp_merit.2095.desc: "敌军鼓声震天,诸将皆请出战.[rp_campaign_actor.GetTitledFirstName]却道:“未可.”\n\n敌军二鼓、三鼓之后,其气渐衰,此人才请击鼓.胜后诸将又欲追击,此人却下车视辙,再观旗号,方道:“可追矣.”"
 rp_merit.2095.a: "此乃良将,全权委以指挥"
 rp_merit.2095.b: "此乃怯战,按军法处置"
 rp_merit.2095.c: "姑且听之,但保留裁断"

 rp_campaign_life_saved_opinion: "代君脱险"
 rp_campaign_shamed_modifier: "军前受挫"
 rp_campaign_shamed_modifier_desc: "此人在军前受挫,锐气已折."
 rp_campaign_loyal_guard_modifier: "死忠护卫"
 rp_campaign_loyal_guard_modifier_desc: "此人曾在乱军中护主脱险,军中皆知其忠."
 rp_campaign_hunger_modifier: "饥军未平"
 rp_campaign_hunger_modifier_desc: "军中粮饷困窘,虽暂时压下,人心仍不安."
 rp_campaign_relief_modifier: "开仓劳军"
 rp_campaign_relief_modifier_desc: "君主亲自拨出粮饷,军中怨气稍解."
