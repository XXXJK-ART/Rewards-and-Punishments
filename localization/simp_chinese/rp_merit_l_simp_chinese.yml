 rp_merit.1100.t: "怨望暗生"
 rp_merit.1100.desc: "拒赏之后,[rp_petitioner.GetTitledFirstName]虽未当场发作,朝中却已有流言散开.其门下与亲族开始观望,税赋与兵役也不再如先前顺畅."
 rp_merit.1100.a: "记入心中"

 rp_merit.1200.t: "败绩当罚"
 rp_merit.1200.desc: "[rp_penalty_target.GetTitledFirstName]近日兵败失利,功簿上新添败绩:[rp_penalty_target.MakeScope.Var('rp_merit_recent_major_loss').GetValue|0].\n\n军中诸将皆在观望:若败而无罚,法度难立；若罚之过重,又恐世家大族离心."
 rp_merit.1200.a: "申斥其失"
 rp_merit.1200.b: "罚俸以正军纪"
 rp_merit.1200.c: "念其世族,暂免重罚"

