 rp_merit.1000.t: "战后请赏"
 rp_merit.1000.desc.major: "[rp_petitioner.GetTitledFirstName]刚在战场上立下显功,军中传言已起.\n\n“此战胜负之间,臣下不敢居全功；但功簿既已记明,愿君上及时赏罚,使诸军知所奋勉.”\n\n功簿所载:[rp_petitioner.MakeScope.Var('rp_merit_score').GetValue|0].近期大战功:[rp_petitioner.MakeScope.Var('rp_merit_recent_major_gain').GetValue|0].态度:[rp_petitioner.Custom('RPMeritAttitude')]."
 rp_merit.1000.desc.humble: "[rp_petitioner.GetTitledFirstName]在战后入见,言辞谨慎地陈述自己的军功.\n\n“臣下幸赖君上威灵,略立寸功.如今军士归营,愿君上量功行赏,使众人知奋.”\n\n功簿所载:[rp_petitioner.MakeScope.Var('rp_merit_score').GetValue|0].态度:[rp_petitioner.Custom('RPMeritAttitude')]."
 rp_merit.1000.desc.demanding: "[rp_petitioner.GetTitledFirstName]径直入见,随从在阶下列成一线.\n\n“此战若无臣下奔走,胜负尚未可知.功簿既明,赏赐也当分明.”\n\n功簿所载:[rp_petitioner.MakeScope.Var('rp_merit_score').GetValue|0].态度:[rp_petitioner.Custom('RPMeritAttitude')]."
 rp_merit.1000.desc.coercive: "[rp_petitioner.GetTitledFirstName]带着家臣前来请赏,话语恭敬,分量却沉.\n\n“臣下与宗族为国出力,军中人心皆望君上明断.若功而无赏,恐难服众.”\n\n功簿所载:[rp_petitioner.MakeScope.Var('rp_merit_score').GetValue|0].态度:[rp_petitioner.Custom('RPMeritAttitude')]."
