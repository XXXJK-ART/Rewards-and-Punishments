 rp_merit.1200.t: "败绩当罚"
 rp_merit.1200.desc: "[rp_penalty_target.GetTitledFirstName]近日兵败失利,功簿上新添败绩:[rp_penalty_target.MakeScope.Var('rp_merit_recent_major_loss').GetValue|0].\n\n军中诸将皆在观望:若败而无罚,法度难立；若罚之过重,又恐世家大族离心."
