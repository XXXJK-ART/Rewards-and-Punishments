 rp_merit.1301.desc: "你将自己的战功录成一卷,呈至[rp_petition_liege.GetTitledFirstName]案前.\n\n功簿所载:[ROOT.Char.MakeScope.Var('rp_merit_score').GetValue|0].按军中旧例,有功者可请金帛、荣名；若功劳足够,亦可请一处采邑."
